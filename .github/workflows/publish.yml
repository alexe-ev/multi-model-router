# Before first use: configure Trusted Publisher on pypi.org
# 1. Go to pypi.org -> Publishing -> Add pending publisher
#    (or after first publish: Your projects -> mmrouter -> Publishing)
# 2. Add GitHub publisher:
#    - Owner: alexe-ev
#    - Repository: multi-model-router
#    - Workflow: publish.yml
#    - Environment: (leave blank)

name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
