version: "1"

routes:
  simple:
    factual:
      model: claude-haiku-4-5-20251001
      fallbacks:
        - claude-sonnet-4-6
        # Cross-provider fallbacks (uncomment for multi-provider resilience):
        # - gpt-4o-mini
        # - gemini-2.0-flash
    reasoning:
      model: claude-haiku-4-5-20251001
      fallbacks:
        - claude-sonnet-4-6
    creative:
      model: claude-sonnet-4-6
      fallbacks:
        - claude-haiku-4-5-20251001
    code:
      model: claude-sonnet-4-6
      fallbacks:
        - claude-haiku-4-5-20251001

  medium:
    factual:
      model: claude-sonnet-4-6
      fallbacks:
        - claude-haiku-4-5-20251001
    reasoning:
      model: claude-sonnet-4-6
      fallbacks:
        - claude-opus-4-6
        # Cross-provider fallbacks:
        # - gpt-4o
        # - gemini-2.5-pro
    creative:
      model: claude-sonnet-4-6
      fallbacks:
        - claude-opus-4-6
    code:
      model: claude-sonnet-4-6
      fallbacks:
        - claude-opus-4-6

  complex:
    factual:
      model: claude-sonnet-4-6
      fallbacks:
        - claude-opus-4-6
    reasoning:
      model: claude-opus-4-6
      fallbacks:
        - claude-sonnet-4-6
        # Cross-provider fallbacks:
        # - gpt-4o
        # - gemini-2.5-pro
    creative:
      model: claude-opus-4-6
      fallbacks:
        - claude-sonnet-4-6
    code:
      model: claude-opus-4-6
      fallbacks:
        - claude-sonnet-4-6

classifier:
  strategy: rules
  threshold: "0.7"

provider:
  timeout_ms: 30000
  max_retries: 2
  circuit_breaker_threshold: 5
  circuit_breaker_reset_ms: 60000
  prompt_caching: true

cascade:
  enabled: false
  strategy: heuristic
  min_response_length: 50

budget:
  enabled: false
  daily_limit: 0.0
  warn_threshold: 0.75
  downgrade_threshold: 0.90
  hard_limit_action: cheapest

adaptive:
  enabled: false
  min_feedback_count: 20
  decay_days: 30
  penalty_threshold: 0.4
  boost_threshold: 0.8
