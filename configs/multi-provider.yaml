version: "1"

routes:
  simple:
    factual:
      model: claude-haiku-4-5-20251001
      fallbacks:
        - gpt-4o-mini
        - gemini-2.0-flash
    reasoning:
      model: claude-haiku-4-5-20251001
      fallbacks:
        - gpt-4o-mini
        - gemini-2.0-flash
    creative:
      model: claude-sonnet-4-6
      fallbacks:
        - gpt-4o
        - gemini-2.5-pro
    code:
      model: claude-sonnet-4-6
      fallbacks:
        - gpt-4o
        - gemini-2.5-pro

  medium:
    factual:
      model: claude-sonnet-4-6
      fallbacks:
        - gpt-4o
        - gemini-2.5-pro
    reasoning:
      model: claude-sonnet-4-6
      fallbacks:
        - gpt-4o
        - gemini-2.5-pro
    creative:
      model: claude-sonnet-4-6
      fallbacks:
        - gpt-4o
        - gemini-2.5-pro
    code:
      model: claude-sonnet-4-6
      fallbacks:
        - gpt-4o
        - gemini-2.5-pro

  complex:
    factual:
      model: claude-sonnet-4-6
      fallbacks:
        - gpt-4o
        - gemini-2.5-pro
    reasoning:
      model: claude-opus-4-6
      fallbacks:
        - gpt-4o
        - gemini-2.5-pro
    creative:
      model: claude-opus-4-6
      fallbacks:
        - gpt-4o
        - gemini-2.5-pro
    code:
      model: claude-opus-4-6
      fallbacks:
        - gpt-4o
        - gemini-2.5-pro

classifier:
  strategy: rules
  threshold: "0.7"

provider:
  timeout_ms: 30000
  max_retries: 2
  circuit_breaker_threshold: 5
  circuit_breaker_reset_ms: 60000
  provider_circuit_breaker_threshold: 2
  provider_circuit_breaker_reset_ms: 120000

cascade:
  enabled: false
  strategy: heuristic
  min_response_length: 50

budget:
  enabled: false
  daily_limit: 0.0
  warn_threshold: 0.75
  downgrade_threshold: 0.90
  hard_limit_action: cheapest
